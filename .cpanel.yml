deployment:
  tasks:
    - echo "DEPLOY OK" > /home/condicasitapane/test.txt
    - touch /home/condicasitapane/test_deploy.txt
    - export APPPATH=/home/condicasitapane/laravel_app
    - export PUBLICPATH=/home/condicasitapane/api_public
    - export REPOPATH=/home/condicasitapane/repositories/flavored-house-service

    # Sincronizar código Laravel (excepto public)
    - /bin/rsync -av --delete --exclude="public" $REPOPATH/ $APPPATH/

    # Copiar solo carpeta public al document root
    - /bin/rsync -av --delete $REPOPATH/public/ $PUBLICPATH/

    # Instalar dependencias
    - cd $APPPATH && /usr/bin/composer install --no-dev --optimize-autoloader

    # Permisos
    - /bin/chmod -R 755 $APPPATH/storage
    - /bin/chmod -R 755 $APPPATH/bootstrap/cache

    # Laravel optimización
    - cd $APPPATH && php artisan config:clear
    - cd $APPPATH && php artisan cache:clear
    - cd $APPPATH && php artisan view:clear

    - cd $APPPATH && php artisan config:cache
    - cd $APPPATH && php artisan route:cache